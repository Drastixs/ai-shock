# Copy to config/device_secrets.toml and fill in values.
# device_secrets.toml is gitignored — do not commit real credentials.

[wifi]
ssid = "your-2.4GHz-ssid"          # ESP32-S3 is 2.4 GHz only
password = "your-wifi-password"

[webrepl]
enabled = true
# REQUIRED to actually start WebREPL (4-9 chars). Without it the port stays closed.
password = "choose-a-local-password"

[device]
# Fill in after first boot / mDNS discovery
# ip = "192.168.x.x"
hostname = "axiometa-tens"

[app]
# false (default) = boot to REPL, WebREPL usable for wireless sync (dev).
# true = auto-start the blocking HTTP API on boot (standalone controller;
#        blocks serial REPL + WebREPL until reset).
http_autostart = false
